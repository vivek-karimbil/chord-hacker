<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Builder Pro</title>
    <style>
        :root { --bg: #f4f7f6; --primary: #2196F3; --secondary: #4CAF50; --accent: #ff9800; --text: #333; }
        body { font-family: system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; display: flex; justify-content: space-between; padding: 15px 20px; background: white; box-sizing: border-box; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #app-container { display: flex; flex-wrap: wrap; padding: 10px; gap: 20px; justify-content: center; max-width: 1300px; width: 100%; box-sizing: border-box; }
        
        .main-view { width: 100%; max-width: 420px; }
        .chord-svg-container { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        
        .controls { display: flex; flex-direction: column; gap: 12px; }
        .selection-group { background: white; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        h1 { margin: 0; font-size: 1.1rem; }
        h3 { margin: 0 0 10px 0; font-size: 0.75rem; color: #777; text-transform: uppercase; letter-spacing: 1px; }
        .root-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .option-btn { padding: 12px 2px; border: 1px solid #eee; background: #fff; border-radius: 6px; font-size: 0.85rem; text-align: center; cursor: pointer; }
        .option-btn.selected { background: var(--primary); color: white; border-color: var(--primary); font-weight: bold; }
        
        /* Title Bar UI */
        .title-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid var(--primary); }
        #song-title-input { flex: 1; padding: 10px 0; font-size: 1.5rem; font-weight: bold; border: none; outline: none; background: transparent; }
        .new-song-btn { background: #e0e0e0; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; color: #666; transition: 0.2s; }
        .new-song-btn:hover { background: var(--primary); color: white; }

        .songbook-section { width: 100%; max-width: 520px; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        .section-block { border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; margin-bottom: 15px; background: #fafafa; }
        .section-block.active { border: 2px solid var(--primary); background: #f0f7ff; }
        .section-header { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .section-title { flex: 1; border: none; background: #eee; padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 0.95rem; outline: none; }
        
        .chord-list { display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; }
        .song-item { display: flex; align-items: center; padding: 8px 12px; background: #e3f2fd; color: #1976d2; border-radius: 6px; font-size: 0.9rem; font-weight: bold; border: 1px solid #bbdefb; cursor: pointer; }
        .song-item.editing { border: 2px solid var(--accent); background: #fff3e0; color: #e65100; }
        .chord-del { margin-left: 8px; color: #ff5252; font-size: 1.2rem; }

        .action-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .add-btn { background: var(--secondary); color: white; }
        .update-btn { background: var(--accent); color: white; display: none; }
        .export-btn { background: #455A64; color: white; }
        .new-sec-btn { background: #9c27b0; color: white; }
        .mini-btn { padding: 6px 10px; font-size: 0.75rem; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: white; }

        .library-drawer { margin-top: 25px; border-top: 2px dashed #ccc; padding-top: 15px; }
        .library-drawer h4 { margin: 0 0 10px 0; font-size: 0.8rem; color: #666; text-transform: uppercase; }
        #saved-songs-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 150px; overflow-y: auto; padding: 5px; }
        .saved-item { font-size: 0.8rem; background: #eee; padding: 8px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ddd; }
        .saved-item:hover { background: #e3f2fd; border-color: var(--primary); }
        .del-saved { color: #ff5252; font-weight: bold; font-size: 1rem; padding: 0 5px; }
    </style>
</head>
<body>

<header>
    <h1><a href="./index.html" style="text-decoration: none; color: inherit;">Chord Sandbox</a></h1>
    <div style="font-size: 0.8rem; color: #888;">Personal Songbook Editor</div>
</header>

<div id="app-container">
    <div class="main-view">
        <div class="chord-svg-container">
            <svg id="chord-svg" width="180" height="240" viewBox="0 0 160 220">
                <text id="note-display" x="80" y="30" fill="black" font-size="28" font-weight="bold" text-anchor="middle">C</text>
                <text id="firstfret-display" x="5" y="105" fill="#f44336" font-size="16" font-weight="bold"></text>
                <g stroke="#444" stroke-width="1">
                    <line x1="30" y1="80" x2="130" y2="80" stroke-width="4"/>
                    <line x1="30" y1="110" x2="130" y2="110"/><line x1="30" y1="140" x2="130" y2="140"/><line x1="30" y1="170" x2="130" y2="170"/><line x1="30" y1="200" x2="130" y2="200"/>
                    <line x1="30" y1="80" x2="30" y2="200"/><line x1="50" y1="80" x2="50" y2="200"/><line x1="70" y1="80" x2="70" y2="200"/><line x1="90" y1="80" x2="90" y2="200"/><line x1="110" y1="80" x2="110" y2="200"/><line x1="130" y1="80" x2="130" y2="200"/>
                </g>
                <g id="markers" font-family="sans-serif" font-size="14"></g><g id="dots"></g>
            </svg>
        </div>

        <div class="controls">
            <div class="selection-group">
                <h3>Root</h3>
                <div class="root-grid" id="root-row">
                    <div class="option-btn" data-value="Ab">Ab</div><div class="option-btn" data-value="A">A</div><div class="option-btn" data-value="Bb">Bb</div><div class="option-btn" data-value="B">B</div><div class="option-btn selected" data-value="C">C</div><div class="option-btn" data-value="C#">C#</div>
                    <div class="option-btn" data-value="D">D</div><div class="option-btn" data-value="Eb">Eb</div><div class="option-btn" data-value="E">E</div><div class="option-btn" data-value="F">F</div><div class="option-btn" data-value="F#">F#</div><div class="option-btn" data-value="G">G</div>
                </div>
            </div>
            <div class="selection-group">
                <h3>Quality</h3>
                <div class="root-grid" id="variant-row">
                    <div class="option-btn selected" data-value="naturals">Maj</div>
                    <div class="option-btn" data-value="minors">min</div>
                    <div class="option-btn" data-value="sixths">6</div>
                    <div class="option-btn" data-value="sevenths">7</div>
                    <div class="option-btn" data-value="ninths">9</div>
                    <div class="option-btn" data-value="minorseventh">m7</div>
                    <div class="option-btn" data-value="majorseventh">Maj7</div>
                    <div class="option-btn" data-value="suspended">dim</div>
                    <div class="option-btn" data-value="suspended">aug</div>
                    <div class="option-btn" data-value="suspended">sus</div>
                </div>
            </div>
            <button id="add-btn" class="action-btn add-btn" onclick="addToActiveSection()">Add to Selected Section</button>
            <button id="update-btn" class="action-btn update-btn" onclick="updateChord()">Update Selected Chord</button>
            <button id="cancel-btn" class="action-btn" style="display:none; background:#ccc;" onclick="cancelEdit()">Cancel Edit</button>
        </div>
    </div>

    <div class="songbook-section">
        <div class="title-bar">
            <input type="text" id="song-title-input" value="My Song">
            <button class="new-song-btn" onclick="clearCurrent()" title="New Song">⊕</button>
        </div>
        
        <div id="sections-container"></div>
        <button class="action-btn new-sec-btn" onclick="autoAddNextSection()">+ Add Next Section</button>
        <button class="action-btn export-btn" onclick="exportGroupedSong()">Export Responsive Sheet</button>
        
        <div class="library-drawer">
            <h4>Song Library</h4>
            <button class="action-btn" onclick="saveSong()" style="background: var(--secondary); color: white; margin-bottom: 15px;">Save Current to Library</button>
            <div id="saved-songs-list"></div>
        </div>
    </div>
</div>

<script>
    /* --- 1. CHORD DATA --- */
    const chords = {
        naturals: [["Ab", [1, 3, 3, 2, 1, 1], "4"], ["A", [-1, 0, 2, 2, 2, 0]], ["Bb", [-1, 1, 3, 3, 3, 1]], ["B", [-1, 2, 4, 4, 4, 2]], ["C", [3, 3, 2, 0, 1, 0]], ["C#", [-1, -1, 3, 1, 2, 1]], ["D", [-1, -1, 0, 2, 3, 2]], ["Eb", [0, 0, 3, 1, 2, 1], "3"], ["E", [0, 2, 2, 1, 0, 0]], ["F", [1, 3, 3, 2, 1, 1]], ["F#", [2, 4, 4, 3, 2, 2]], ["G", [3, 2, 0, 0, 0, 3]]],
        minors: [["Abm", [1, 3, 3, 1, 1, 1], "4"], ["Am", [-1, 0, 2, 2, 1, 0]], ["Bbm", [-1, 1, 3, 3, 2, 1]], ["Bm", [-1, 2, 4, 4, 3, 2]], ["Cm", [-1, 1, 3, 3, 2, 1], "3"], ["C#m", [-1, -1, 2, 1, 2, 0]], ["Dm", [-1, -1, 0, 2, 3, 1]], ["Ebm", [-1, -1, 4, 3, 4, 2]], ["Em", [0, 2, 2, 0, 0, 0]], ["Fm", [1, 3, 3, 1, 1, 1]], ["F#m", [2, 4, 4, 2, 2, 2]], ["Gm", [1, 3, 3, 1, 1, 1], "3"]],
        sixths: [["Ab6", [4, 3, 1, 1, 1, 1]], ["A6", [-1, 0, 2, 2, 2, 2]], ["Bb6", [1, 1, 3, 3, 3, 3]], ["B6", [2, 2, 4, 4, 4, 4]], ["C6", [-1, -1, 2, 2, 1, 3]], ["C#6", [-1, -1, 3, 3, 2, 4]], ["D6", [-1, 0, 0, 2, 0, 2]], ["Eb6", [-1, -1, 1, 3, 1, 3]], ["E6", [0, 2, 2, 1, 2, 0]], ["F6", [-1, -1, 0, 2, 1, 1]], ["F#6", [-1, 4, 4, 3, 4, -1]], ["G6", [3, 2, 0, 0, 0, 0]]],
        minorsixth: [["Abm6", [-1, -1, -1, 4, 4, 4]], ["Am6", [-1, 0, 2, 2, 1, 2]], ["Bbm6", [-1, -1, 3, 3, 2, 3]], ["Bm6", [-1, -1, 4, 4, 3, 4]], ["Cm6", [-1, -1, 1, 2, 1, 3]], ["C#m6", [-1, -1, 2, 3, 2, 4]], ["Dm6", [-1, -1, 0, 2, 0, 1]], ["Ebm6", [-1, -1, 1, 3, 1, 2]], ["Em6", [0, 2, 2, 0, 2, 0]], ["Fm6", [-1, -1, 0, 1, 1, 1]], ["F#m6", [-1, -1, 1, 2, 2, 2]], ["Gm6", [-1, -1, 2, 3, 3, 3]]],
        sevenths: [["Ab7", [-1, -1, 1, 1, 1, 2]], ["A7", [-1, 0, 2, 2, 2, 3]], ["Bb7", [-1, -1, 1, 1, 1, 2], "3"], ["B7", [-1, 2, 1, 2, 0, 2]], ["C7", [-1, 3, 2, 3, 1, 0]], ["C#7", [-1, -1, 3, 4, 2, 4]], ["D7", [-1, -1, 0, 2, 1, 2]], ["Eb7", [-1, -1, 1, 3, 2, 3]], ["E7", [0, 2, 2, 1, 3, 0]], ["F7", [1, 3, 1, 2, 1, 1]], ["F#7", [-1, -1, 4, 3, 2, 0]], ["G7", [3, 2, 0, 0, 0, 1]]],
        ninths: [["Ab9", [-1, -1, 1, 3, 1, 2]], ["A9", [-1, 0, 2, 4, 2, 3]], ["Bb9", [1, 1, 3, 1, 1, 1], "3"], ["B9", [-1, 2, 1, 2, 2, 2]], ["C9", [-1, 3, 2, 3, 3, 3]], ["C#9", [-1, 4, 3, 4, 4, 4]], ["D9", [2, 0, 0, 2, 1, 0]], ["Eb9", [1, 1, 1, 3, 2, 1]], ["E9", [0, 2, 0, 1, 0, 2]], ["F9", [-1, -1, 3, 2, 4, 3]], ["F#9", [-1, -1, 2, 1, 4, 3], "1"], ["G9", [3, 0, 0, 2, 0, 1]]],
        minorseventh: [["Abm7", [-1, -1, 1, 1, 0, 2]], ["Am7", [-1, 0, 2, 2, 1, 3]], ["Bbm7", [-1, -1, 3, 3, 2, 4]], ["Bm7", [-1, 1, 3, 1, 2, 1], "2"], ["Cm7", [-1, -1, 1, 3, 1, 3]], ["C#m7", [-1, -1, 2, 4, 2, 4]], ["Dm7", [-1, -1, 0, 2, 1, 1]], ["Ebm7", [-1, -1, 1, 3, 2, 2]], ["Em7", [0, 2, 0, 0, 0, 0]], ["Fm7", [1, 3, 1, 1, 1, 1]], ["F#m7", [-1, -1, 2, 2, 2, 2]], ["Gm7", [1, 3, 1, 1, 1, 1], "3"]],
        majorseventh: [["AbM7", [-1, -1, 1, 1, 1, 3]], ["AM7", [-1, 0, 2, 1, 2, 0]], ["BbM7", [-1, 1, 3, 2, 3, -1]], ["BM7", [-1, 2, 4, 3, 4, -1]], ["CM7", [-1, 3, 2, 0, 0, 0]], ["C#M7", [-1, 4, 3, 1, 1, 1]], ["DM7", [-1, -1, 0, 2, 2, 2]], ["EbM7", [-1, -1, 1, 3, 3, 3]], ["EM7", [0, 2, 1, 1, 0, 0]], ["FM7", [-1, -1, 3, 2, 1, 0]], ["F#M7", [-1, -1, 4, 3, 2, 1]], ["GM7", [-1, -1, 4, 3, 2, 1], "2"]],
        diminished: [["Abdim", [-1, -1, 0, 1, 0, 1]], ["Adim", [-1, -1, 1, 2, 1, 2]], ["Bbdim", [-1, -1, 2, 3, 2, 3]], ["Bdim", [-1, -1, 0, 1, 0, 1]], ["Cdim", [-1, -1, 1, 2, 1, 2]], ["C#dim", [-1, -1, 2, 3, 2, 3]], ["Ddim", [-1, -1, 0, 1, 0, 1]], ["Ebdim", [-1, -1, 1, 2, 1, 2]], ["Edim", [-1, -1, 2, 3, 2, 3]], ["Fdim", [-1, -1, 0, 1, 0, 1]], ["F#dim", [-1, -1, 1, 2, 1, 2]], ["Gdim", [-1, -1, 2, 3, 2, 3]]],
        augmented: [["Ab+", [-1, -1, 2, 1, 1, 0]], ["A+", [-1, 0, 3, 2, 2, 1]], ["Bb+", [-1, -1, 0, 3, 3, 2]], ["B+", [-1, -1, 3, 2, 2, 1], "3"], ["C+", [-1, -1, 2, 1, 1, 0]], ["C#+", [-1, -1, 3, 2, 2, 1]], ["D+", [-1, -1, 0, 3, 3, 2]], ["Eb+", [-1, -1, 1, 0, 0, 3]], ["E+", [-1, -1, 2, 1, 1, 0]], ["F+", [-1, -1, 3, 2, 2, 1]], ["F#+", [-1, -1, 4, 3, 3, 2]], ["G+", [-1, -1, 1, 0, 0, 3]]],
        suspended: [["Absus", [-1, -1, 1, 1, 2, 4]], ["Asus", [-1, 0, 2, 2, 3, 0]], ["Bbsus", [-1, -1, 3, 3, 4, 1]], ["Bsus", [-1, -1, 3, 3, 4, 1], "2"], ["Csus", [-1, -1, 3, 0, 1, 3]], ["C#sus", [-1, -1, 3, 3, 4, 1]], ["Dsus", [-1, -1, 0, 2, 3, 3]], ["Ebsus", [-1, -1, 1, 3, 4, 4]], ["Esus", [0, 2, 2, 2, 0, 0]], ["Fsus", [-1, -1, 3, 3, 1, 1]], ["F#sus", [-1, -1, 4, 4, 2, 2]], ["Gsus", [-1, -1, 0, 0, 1, 3]]]
    };

    const suffixMap = {
        naturals: "", minors: "m", sixths: "6", sevenths: "7", ninths: "9",
        minorseventh: "m7", majorseventh: "M7", diminished: "dim",
        augmented: "+", suspended: "sus"
    };

    /* --- 2. STATE --- */
    let songData = [];
    let activeSectionId = null;
    let editingChordPath = null;

        function clearCurrent() {
            if(confirm("Discard current song and start new?")) {
                songData = [];
                document.getElementById('song-title-input').value = "New Song";
                autoAddNextSection();
            }
        }
        
    /* --- 3. CHORD DRAWING --- */
    function drawChord(chordObj) {
        if (!chordObj) return;
        document.getElementById("note-display").textContent = chordObj.note;
        document.getElementById("firstfret-display").textContent = chordObj.firstfret || "";
        const m = document.getElementById("markers"); m.innerHTML = "";
        const d = document.getElementById("dots"); d.innerHTML = "";
        
        chordObj.frets.forEach((f, i) => {
            const x = 30 + (i * 20);
            if (f <= 0) {
                const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt.setAttribute("x", x); txt.setAttribute("y", 70); txt.setAttribute("text-anchor", "middle");
                txt.textContent = f === -1 ? "x" : "o"; m.appendChild(txt);
            } else {
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", x); c.setAttribute("cy", 80 + (f * 30) - 15); c.setAttribute("r", 7);
                c.setAttribute("fill", "#333"); d.appendChild(c);
            }
        });
    }

        function autoAddNextSection() {
            let name = "Verse 1";
            if (songData.length === 1) name = "Chorus";
            else if (songData.length > 1) name = "New Section";
            addNewSection(name);
        }

    function getSelectedChord() {
        const root = document.querySelector("#root-row .selected").dataset.value;
        const typeKey = document.querySelector("#variant-row .selected").dataset.value;
        const searchNote = root + (suffixMap[typeKey] || "");
        const raw = chords[typeKey].find(c => c[0] === searchNote);
        return raw ? { note: raw[0], frets: raw[1], firstfret: raw[2] || "" } : null;
    }

    function updatePreview() {
        drawChord(getSelectedChord());
    }

    /* --- 4. SONG LOGIC --- */
    function addNewSection(title = "New Section") {
        const id = Date.now();
        songData.push({ id: id, title: title, chords: [] });
        activeSectionId = id;
        renderSections();
    }

    function addToActiveSection() {
        if (!activeSectionId) return;
        const chord = getSelectedChord();
        const section = songData.find(s => s.id === activeSectionId);
        if (section && chord) {
            section.chords.push(JSON.parse(JSON.stringify(chord)));
            renderSections();
        }
    }

    function renderSections() {
        const container = document.getElementById("sections-container");
        container.innerHTML = "";
        songData.forEach(sec => {
            const div = document.createElement("div");
            div.className = "section-block " + (sec.id === activeSectionId ? "active" : "");
            div.onclick = () => { activeSectionId = sec.id; renderSections(); };
            
            let html = "<div class='section-header'>";
            html += "<input type='text' class='section-title' value='" + sec.title + "' oninput='updateSecTitle(" + sec.id + ", this.value)'>";
            html += "<button class='mini-btn' onclick='event.stopPropagation(); deleteSection(" + sec.id + ")'>x</button>";
            html += "</div><div class='chord-list'>";
            
            sec.chords.forEach((c, i) => {
                // Check if this specific chord is currently being edited
                const isEditing = editingChordPath && editingChordPath.sId === sec.id && editingChordPath.cIdx === i;
                html += "<div class='song-item " + (isEditing ? "editing" : "") + "' onclick='event.stopPropagation(); editChord(" + sec.id + ", " + i + ")'>";
                html += c.note + " <span class='chord-del' onclick='event.stopPropagation(); removeChord(" + sec.id + "," + i + ")'>x</span></div>";
            });
            
            html += "</div>";
            div.innerHTML = html;
            container.appendChild(div);
        });
    }

    function editChord(sId, cIdx) {
        editingChordPath = { sId, cIdx };
        const section = songData.find(s => s.id === sId);
        const chord = section.chords[cIdx];
        
        // 1. Show the chord in the main SVG preview
        drawChord(chord);
        
        // 2. Toggle UI buttons
        document.getElementById("add-btn").style.display = "none";
        document.getElementById("update-btn").style.display = "block";
        document.getElementById("cancel-btn").style.display = "block";
        
        renderSections();
    }

    function updateChord() {
        if (!editingChordPath) return;
        const { sId, cIdx } = editingChordPath;
        const newChord = getSelectedChord();
        
        const section = songData.find(s => s.id === sId);
        if (section && newChord) {
            section.chords[cIdx] = JSON.parse(JSON.stringify(newChord));
        }
        
        cancelEdit(); // Reset UI
    }

    function cancelEdit() {
        editingChordPath = null;
        document.getElementById("add-btn").style.display = "block";
        document.getElementById("update-btn").style.display = "none";
        document.getElementById("cancel-btn").style.display = "none";
        renderSections();
    }

    function loadSong(title) {
        const saved = localStorage.getItem('chordSong_' + title);
        if (saved) {
            const pkg = JSON.parse(saved);
            document.getElementById('song-title-input').value = pkg.title;
            songData = pkg.data;
            if (songData.length > 0) activeSectionId = songData[0].id;
            renderSections();
        }
    }

    function saveSong() {
        const title = document.getElementById('song-title-input').value.trim() || "Untitled Song";
        const pkg = { title, data: songData };
        localStorage.setItem('chordSong_' + title, JSON.stringify(pkg));
        renderLibrary();
    }

    function deleteSaved(title, e) {
        e.stopPropagation();
        if(confirm('Delete ' + title + '?')) {
            localStorage.removeItem('chordSong_' + title);
            renderLibrary();
        }
    }

    function renderLibrary() {
        const list = document.getElementById('saved-songs-list');
        list.innerHTML = "";
        Object.keys(localStorage).forEach(key => {
            if (key.startsWith('chordSong_')) {
                const title = key.replace('chordSong_', '');
                const div = document.createElement('div');
                div.className = 'saved-item';
                div.innerHTML = `<span>${title}</span><span class="del-saved" onclick="deleteSaved('${title}', event)">×</span>`;
                div.onclick = () => loadSong(title);
                list.appendChild(div);
            }
        });
    }

    function updateSecTitle(id, val) { songData.find(s => s.id === id).title = val; }
    function deleteSection(id) { songData = songData.filter(s => s.id !== id); renderSections(); }
    function removeChord(sId, idx) { songData.find(s => s.id === sId).chords.splice(idx, 1); renderSections(); }

    /* --- 5. EXPORT --- */
    function exportGroupedSong() {
        const title = document.getElementById("song-title-input").value || "Song Sheet";
        
        // Helper to create the SVG string for each chord in the export
        const generateChordSVG = (c) => {
            let markers = "";
            let dots = "";
            c.frets.forEach((f, i) => {
                const x = 30 + (i * 20);
                if (f <= 0) {
                    markers += "<text x='" + x + "' y='70' text-anchor='middle' font-family='sans-serif' font-size='12'>" + (f === -1 ? "x" : "o") + "</text>";
                } else {
                    dots += "<circle cx='" + x + "' cy='" + (80 + (f * 30) - 15) + "' r='6' fill='#333' />";
                }
            });

            return "<svg width='120' height='160' viewBox='0 0 160 220' style='display:block; margin:0 auto;'>" +
                "<text x='80' y='30' fill='black' font-size='24' font-weight='bold' text-anchor='middle' font-family='sans-serif'>" + c.note + "</text>" +
                "<text x='5' y='105' fill='#f44336' font-size='14' font-weight='bold' font-family='sans-serif'>" + (c.firstfret || "") + "</text>" +
                "<g stroke='#444' stroke-width='1'>" +
                    "<line x1='30' y1='80' x2='130' y2='80' stroke-width='3'/>" +
                    "<line x1='30' y1='110' x2='130' y2='110'/><line x1='30' y1='140' x2='130' y2='140'/><line x1='30' y1='170' x2='130' y2='170'/><line x1='30' y1='200' x2='130' y2='200'/>" +
                    "<line x1='30' y1='80' x2='30' y2='200'/><line x1='50' y1='80' x2='50' y2='200'/><line x1='70' y1='80' x2='70' y2='200'/><line x1='90' y1='80' x2='90' y2='200'/><line x1='110' y1='80' x2='110' y2='200'/><line x1='130' y1='80' x2='130' y2='200'/>" +
                "</g>" + markers + dots + "</svg>";
        };

        let bodyHtml = "<h1>" + title + "</h1>";
        
        songData.forEach(sec => {
            bodyHtml += "<div style='page-break-inside: avoid; margin-bottom: 30px;'>";
            bodyHtml += "<h2 style='border-bottom: 1px solid #eee; padding-bottom: 5px;'>" + sec.title + "</h2>";
            bodyHtml += "<div style='display:flex; flex-wrap:wrap; gap:15px;'>";
            sec.chords.forEach(c => {
                bodyHtml += "<div style='border:1px solid #ddd; padding:5px; border-radius:8px; background:#fff; width:130px;'>";
                bodyHtml += generateChordSVG(c);
                bodyHtml += "</div>";
            });
            bodyHtml += "</div></div>";
        });

        const finalHtml = "<html><head><title>" + title + "<\/title>" + 
            "<style>body{font-family:sans-serif; padding:40px; background:#f9f9f9;} h1{color:#2196F3;} @media print{body{padding:0;} .no-print{display:none;}}<\/style>" + 
            "<\/head><body>" + bodyHtml + "<\/body><\/html>";

        const blob = new Blob([finalHtml], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = title.replace(/\s+/g, '_') + '_sheet.html';
        a.click();
    }

    /* --- 6. INIT --- */
    document.querySelectorAll('.option-btn').forEach(btn => {
        btn.onclick = (e) => {
            e.currentTarget.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            e.currentTarget.classList.add('selected');
            updatePreview();
        };
    });
    renderLibrary();
    addNewSection("Verse 1");
    updatePreview();
</script>
</body>
</html>
