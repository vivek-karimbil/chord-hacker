<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #f4f7f6;
            --card: #ffffff;
            --primary: #2196F3;
            --text: #333;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 10;
        }

        h1 { margin: 0; font-size: 1rem; }

        .layout-toggle {
            padding: 6px 10px;
            cursor: pointer;
            background: #e0e0e0;
            border: none;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        #app-container {
            display: flex;
            flex: 1;
            padding: 10px;
            gap: 15px;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        #app-container.portrait-mode { flex-direction: row; }
        #app-container.stack-mode { 
            flex-direction: column; 
            overflow-y: auto; 
            justify-content: flex-start;
        }

        .chord-svg-container {
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            flex-shrink: 0;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 380px;
            min-width: 300px; /* Prevents controls from getting too narrow */
        }

        .selection-group {
            background: white;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        h3 { margin: 0 0 4px 0; font-size: 0.6rem; color: #999; text-transform: uppercase; letter-spacing: 1px;}

        .selection-row {
            display: flex;
            flex-wrap: nowrap; /* Forces single line for roots */
            gap: 4px;
        }

        .option-btn {
            flex: 1 1 0; /* Distributes width equally */
            padding: 8px 2px;
            border: 1px solid #eee;
            background: #fff;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.8rem;
            text-align: center;
            min-width: 0; /* Allows buttons to shrink to fit */
        }

        /* Specifically for chord types which need to wrap */
        #variant-row { flex-wrap: wrap; }
        #variant-row .option-btn { flex: 1 1 45px; }

        .option-btn.selected {
            background: var(--primary);
            color: white;
            border-color: #1976D2;
            font-weight: bold;
        }

        svg { max-height: 70vh; width: auto; }
    </style>
</head>
<body>

<header>
    <h1><a href="./index.html" style="text-decoration: none; color: inherit;">Chord Sandbox</a></h1>
    <button class="layout-toggle" onclick="toggleLayout()">Stack View</button>
</header>

<div id="app-container" class="portrait-mode">
    
    <div class="chord-svg-container">
        <svg id="chord-svg" width="200" height="320" viewBox="0 0 160 250" xmlns="http://www.w3.org/2000/svg">
            <text id="note-display" x="80" y="25" fill="black" font-size="24" font-weight="bold" text-anchor="middle">C</text>
            <text id="comment" x="80" y="42" fill="grey" font-size="10" text-anchor="middle"></text>
            <text id="firstfret" x="2" y="95" fill="black" font-size="18"></text>

            <text id="opun1" x="25" y="60" fill="black" text-anchor="middle" font-size="14">o</text>
            <text id="opun2" x="45" y="60" fill="black" text-anchor="middle" font-size="14">o</text>
            <text id="opun3" x="65" y="60" fill="black" text-anchor="middle" font-size="14">o</text>
            <text id="opun4" x="85" y="60" fill="black" text-anchor="middle" font-size="14">o</text>
            <text id="opun5" x="105" y="60" fill="black" text-anchor="middle" font-size="14">o</text>
            <text id="opun6" x="125" y="60" fill="black" text-anchor="middle" font-size="14">o</text>

            <line id="fret0" x1="25" y1="70" x2="125" y2="70" stroke="black" stroke-width="4"/>
            <line x1="25" y1="100" x2="125" y2="100" stroke="black" />
            <line x1="25" y1="130" x2="125" y2="130" stroke="black" />
            <line x1="25" y1="160" x2="125" y2="160" stroke="black" />
            <line x1="25" y1="190" x2="125" y2="190" stroke="black" />

            <line x1="25" y1="70" x2="25" y2="190" stroke="black" />
            <line x1="45" y1="70" x2="45" y2="190" stroke="black" />
            <line x1="65" y1="70" x2="65" y2="190" stroke="black" />
            <line x1="85" y1="70" x2="85" y2="190" stroke="black" />
            <line x1="105" y1="70" x2="105" y2="190" stroke="black" />
            <line x1="125" y1="70" x2="125" y2="190" stroke="black" />

            <g>
                <circle id="note1" cx="25" cy="0" r="9" fill="black" style="visibility:hidden"/>
                <circle id="note2" cx="45" cy="0" r="9" fill="black" style="visibility:hidden"/>
                <circle id="note3" cx="65" cy="0" r="9" fill="black" style="visibility:hidden"/>
                <circle id="note4" cx="85" cy="0" r="9" fill="black" style="visibility:hidden"/>
                <circle id="note5" cx="105" cy="0" r="9" fill="black" style="visibility:hidden"/>
                <circle id="note6" cx="125" cy="0" r="9" fill="black" style="visibility:hidden"/>

                <text id="label1" x="25" y="0" fill="white" text-anchor="middle" font-size="8" dominant-baseline="middle"></text>
                <text id="label2" x="45" y="0" fill="white" text-anchor="middle" font-size="8" dominant-baseline="middle"></text>
                <text id="label3" x="65" y="0" fill="white" text-anchor="middle" font-size="8" dominant-baseline="middle"></text>
                <text id="label4" x="85" y="0" fill="white" text-anchor="middle" font-size="8" dominant-baseline="middle"></text>
                <text id="label5" x="105" y="0" fill="white" text-anchor="middle" font-size="8" dominant-baseline="middle"></text>
                <text id="label6" x="125" y="0" fill="white" text-anchor="middle" font-size="8" dominant-baseline="middle"></text>
            </g>
        </svg>
    </div>

    <div class="controls">
        <div class="selection-group">
            <h3>Root</h3>
            <div class="selection-row" id="root-row">
                <div class="option-btn" data-value="A">A</div>
                <div class="option-btn" data-value="B">B</div>
                <div class="option-btn selected" data-value="C">C</div>
                <div class="option-btn" data-value="D">D</div>
                <div class="option-btn" data-value="E">E</div>
                <div class="option-btn" data-value="F">F</div>
                <div class="option-btn" data-value="G">G</div>
            </div>
        </div>

        <div class="selection-group">
            <h3>Accidental</h3>
            <div class="selection-row" id="type-row">
                <div class="option-btn selected" data-value="">♮</div>
                <div class="option-btn" data-value="#">#</div>
                <div class="option-btn" data-value="b">b</div>
            </div>
        </div>

        <div class="selection-group">
            <h3>Chord Type</h3>
            <div class="selection-row" id="variant-row">
                <div class="option-btn selected" data-value="">Maj</div>
                <div class="option-btn" data-value="m">min</div>
                <div class="option-btn" data-value="6">6</div>
                <div class="option-btn" data-value="7">7</div>
                <div class="option-btn" data-value="9">9</div>
                <div class="option-btn" data-value="m6">m6</div>
                <div class="option-btn" data-value="m7">m7</div>
                <div class="option-btn" data-value="M7">M7</div>
                <div class="option-btn" data-value="dim">dim</div>
                <div class="option-btn" data-value="+">+</div>
                <div class="option-btn" data-value="sus">sus</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Logic remains identical to previous version
    const notesArr = [ "Ab", "A", "Bb", "B", "C", "C#", "D", "Eb", "E", "F", "F#", "G" ];
    const tuning = [ "E", "A", "D", "G", "B", "E" ];

    // [KEEP YOUR FULL CHORDS DATA HERE]
    const chordsData = {
        naturals: [{note: "Ab", frets: [ 1, 3, 3, 2, 1, 1], firstfret: "4"},{note: "A", frets: [ -1, 0, 2, 2, 2, 0]},{note: "Bb", frets: [ -1, 1, 3, 3, 3, 1]},{note: "B", frets: [ -1, 2, 4, 4, 4, 2]},{note: "C", frets: [ 3, 3, 2, 0, 1, 0]},{note: "C#", frets: [ -1, -1, 3, 1, 2, 1]},{note: "D", frets: [ -1, -1, 0, 2, 3, 2]},{note: "Eb", frets: [ 0, 0, 3, 1, 2, 1], firstfret: "3"},{note: "E", frets: [ 0, 2, 2, 1, 0, 0]},{note: "F", frets: [ 1, 3, 3, 2, 1, 1]},{note: "F#", frets: [ 2, 4, 4, 3, 2, 2]},{note: "G", frets: [ 3, 2, 0, 0, 0, 3]}],
        minors: [{note: "Abm", frets: [ 1, 3, 3, 1, 1, 1], firstfret: "4"},{note: "Am", frets: [ -1, 0, 2, 2, 1, 0]},{note: "Bbm", frets: [ -1, 1, 3, 3, 2, 1]},{note: "Bm", frets: [ -1, 2, 4, 4, 3, 2]},{note: "Cm", frets: [ -1, 1, 3, 3, 2, 1], firstfret: "3"},{note: "C#m", frets: [ -1, -1, 2, 1, 2, 0]},{note: "Dm", frets: [ -1, -1, 0, 2, 3, 1]},{note: "Ebm", frets: [ -1, -1, 4, 3, 4, 2]},{note: "Em", frets: [ 0, 2, 2, 0, 0, 0]},{note: "Fm", frets: [ 1, 3, 3, 1, 1, 1]},{note: "F#m", frets: [ 2, 4, 4, 2, 2, 2]},{note: "Gm", frets: [ 1, 3, 3, 1, 1, 1], firstfret: "3"}],
        sixths: [{note: "Ab6", frets: [ 4, 3, 1, 1, 1, 1]},{note: "A6", frets: [ -1, 0, 2, 2, 2, 2]},{note: "Bb6", frets: [ 1, 1, 3, 3, 3, 3]},{note: "B6", frets: [ 2, 2, 4, 4, 4, 4]},{note: "C6", frets: [ -1, -1, 2, 2, 1, 3]},{note: "C#6", frets: [ -1, -1, 3, 3, 2, 4]},{note: "D6", frets: [ -1, 0, 0, 2, 0, 2]},{note: "Eb6", frets: [ -1, -1, 1, 3, 1, 3]},{note: "E6", frets: [ 0, 2, 2, 1, 2, 0]},{note: "F6", frets: [ -1, -1, 0, 2, 1, 1]},{note: "F#6", frets: [ -1, 4, 4, 3, 4, -1]},{note: "G6", frets: [ 3, 2, 0, 0, 0, 0]}],
        sevenths: [{note: "Ab7", frets: [ -1, -1, 1, 1, 1, 2]},{note: "A7", frets: [ -1, 0, 2, 2, 2, 3]},{note: "Bb7", frets: [ -1, -1, 1, 1, 1, 2], firstfret: "3"},{note: "B7", frets: [ -1, 2, 1, 2, 0, 2]},{note: "C7", frets: [ -1, 3, 2, 3, 1, 0]},{note: "C#7", frets: [ -1, -1, 3, 4, 2, 4]},{note: "D7", frets: [ -1, -1, 0, 2, 1, 2]},{note: "Eb7", frets: [ -1, -1, 1, 3, 2, 3]},{note: "E7", frets: [ 0, 2, 2, 1, 3, 0]},{note: "F7", frets: [ 1, 3, 1, 2, 1, 1]},{note: "F#7", frets: [ -1, -1, 4, 3, 2, 0]},{note: "G7", frets: [ 3, 2, 0, 0, 0, 1]}],
        ninths: [{note: "Ab9", frets: [ -1, -1, 1, 3, 1, 2]},{note: "A9", frets: [ -1, 0, 2, 4, 2, 3]},{note: "Bb9", frets: [ 1, 1, 3, 1, 1, 1], firstfret: "3"},{note: "B9", frets: [ -1, 2, 1, 2, 2, 2]},{note: "C9", frets: [ -1, 3, 2, 3, 3, 3]},{note: "C#9", frets: [ -1, 4, 3, 4, 4, 4]},{note: "D9", frets: [ 2, 0, 0, 2, 1, 0]},{note: "Eb9", frets: [ 1, 1, 1, 3, 2, 1]},{note: "E9", frets: [ 0, 2, 0, 1, 0, 2]},{note: "F9", frets: [ -1, -1, 3, 2, 4, 3]},{note: "F#9", frets: [ -1, -1, 2, 1, 4, 3], firstfret: "1"},{note: "G9", frets: [ 3, 0, 0, 2, 0, 1]}],
        minorsixth: [{note: "Abm6", frets: [ -1, -1, -1, 4, 4, 4]},{note: "Am6", frets: [ -1, 0, 2, 2, 1, 2]},{note: "Bbm6", frets: [ -1, -1, 3, 3, 2, 3]},{note: "Bm6", frets: [ -1, -1, 4, 4, 3, 4]},{note: "Cm6", frets: [ -1, -1, 1, 2, 1, 3]},{note: "C#m6", frets: [ -1, -1, 2, 3, 2, 4]},{note: "Dm6", frets: [ -1, -1, 0, 2, 0, 1]},{note: "Ebm6", frets: [ -1, -1, 1, 3, 1, 2]},{note: "Em6", frets: [ 0, 2, 2, 0, 2, 0]},{note: "Fm6", frets: [ -1, -1, 0, 1, 1, 1]},{note: "F#m6", frets: [ -1, -1, 1, 2, 2, 2]},{note: "Gm6", frets: [ -1, -1, 2, 3, 3, 3]}],
        minorseventh: [{note: "Abm7", frets: [ -1, -1, 1, 1, 0, 2]},{note: "Am7", frets: [ -1, 0, 2, 2, 1, 3]},{note: "Bbm7", frets: [ -1, -1, 3, 3, 2, 4]},{note: "Bm7", frets: [ -1, 1, 3, 1, 2, 1], firstfret: 2},{note: "Cm7", frets: [ -1, -1, 1, 3, 1, 3]},{note: "C#m7", frets: [ -1, -1, 2, 4, 2, 4]},{note: "Dm7", frets: [ -1, -1, 0, 2, 1, 1]},{note: "Ebm7", frets: [ -1, -1, 1, 3, 2, 2]},{note: "Em7", frets: [ 0, 2, 0, 0, 0, 0]},{note: "Fm7", frets: [ 1, 3, 1, 1, 1, 1]},{note: "F#m7", frets: [ -1, -1, 2, 2, 2, 2]},{note: "Gm7", frets: [ 1, 3, 1, 1, 1, 1], firstfret: 3}],
        majorseventh: [{note: "AbM7", frets: [ -1, -1, 1, 1, 1, 3]},{note: "AM7", frets: [ -1, 0, 2, 1, 2, 0]},{note: "BbM7", frets: [ -1, 1, 3, 2, 3, -1]},{note: "BM7", frets: [ -1, 2, 4, 3, 4, -1]},{note: "CM7", frets: [ -1, 3, 2, 0, 0, 0]},{note: "C#M7", frets: [ -1, 4, 3, 1, 1, 1]},{note: "DM7", frets: [ -1, -1, 0, 2, 2, 2]},{note: "EbM7", frets: [ -1, -1, 1, 3, 3, 3]},{note: "EM7", frets: [ 0, 2, 1, 1, 0, 0]},{note: "FM7", frets: [ -1, -1, 3, 2, 1, 0]},{note: "F#M7", frets: [ -1, -1, 4, 3, 2, 1]},{note: "GM7", frets: [ -1, -1, 4, 3, 2, 1], firstfret: 2}],
        diminished: [{note: "Abdim", frets: [ -1, -1, 0, 1, 0, 1]},{note: "Adim", frets: [ -1, -1, 1, 2, 1, 2]},{note: "Bbdim", frets: [ -1, -1, 2, 3, 2, 3]},{note: "Bdim", frets: [ -1, -1, 0, 1, 0, 1]},{note: "Cdim", frets: [ -1, -1, 1, 2, 1, 2]},{note: "C#dim", frets: [ -1, -1, 2, 3, 2, 3]},{note: "Ddim", frets: [ -1, -1, 0, 1, 0, 1]},{note: "Ebdim", frets: [ -1, -1, 1, 2, 1, 2]},{note: "Edim", frets: [ -1, -1, 2, 3, 2, 3]},{note: "Fdim", frets: [ -1, -1, 0, 1, 0, 1]},{note: "F#dim", frets: [ -1, -1, 1, 2, 1, 2]},{note: "Gdim", frets: [ -1, -1, 2, 3, 2, 3]}],
        augmented: [{note: "Ab+", frets: [ -1, -1, 2, 1, 1, 0]},{note: "A+", frets: [ -1, 0, 3, 2, 2, 1]},{note: "Bb+", frets: [ -1, -1, 0, 3, 3, 2]},{note: "B+", frets: [ -1, -1, 3, 2, 2, 1], firstfret: "3"},{note: "C+", frets: [ -1, -1, 2, 1, 1, 0]},{note: "C#+", frets: [ -1, -1, 3, 2, 2, 1]},{note: "D+", frets: [ -1, -1, 0, 3, 3, 2]},{note: "Eb+", frets: [ -1, -1, 1, 0, 0, 3]},{note: "E+", frets: [ -1, -1, 2, 1, 1, 0]},{note: "F+", frets: [ -1, -1, 3, 2, 2, 1]},{note: "F#+", frets: [ -1, -1, 4, 3, 3, 2]},{note: "G+", frets: [ -1, -1, 1, 0, 0, 3]}],
        suspended: [{note: "Absus", frets: [ -1, -1, 1, 1, 2, 4]},{note: "Asus", frets: [ -1, 0, 2, 2, 3, 0]},{note: "Bbsus", frets: [ -1, -1, 3, 3, 4, 1]},{note: "Bsus", frets: [ -1, -1, 3, 3, 4, 1], firstfret: "2"},{note: "Csus", frets: [ -1, -1, 3, 0, 1, 3]},{note: "C#sus", frets: [ -1, -1, 3, 3, 4, 1]},{note: "Dsus", frets: [ -1, -1, 0, 2, 3, 3]},{note: "Ebsus", frets: [ -1, -1, 1, 3, 4, 4]},{note: "Esus", frets: [ 0, 2, 2, 2, 0, 0]},{note: "Fsus", frets: [ -1, -1, 3, 3, 1, 1]},{note: "F#sus", frets: [ -1, -1, 4, 4, 2, 2]},{note: "Gsus", frets: [ -1, -1, 0, 0, 1, 3]}]
    };

    function toggleLayout() {
        const container = document.getElementById('app-container');
        const btn = document.querySelector('.layout-toggle');
        if (container.classList.contains('portrait-mode')) {
            container.classList.replace('portrait-mode', 'stack-mode');
            btn.textContent = 'Side-by-Side';
        } else {
            container.classList.replace('stack-mode', 'portrait-mode');
            btn.textContent = 'Stack View';
        }
    }

    function getKey() {
        const root = document.querySelector("#root-row .selected").dataset.value;
        const accidental = document.querySelector("#type-row .selected").dataset.value;
        const variant = document.querySelector("#variant-row .selected").dataset.value;
        let key = root + accidental;
        const comment = document.querySelector("#comment");
        comment.textContent = "";
        const map = {"A#":"Bb", "B#":"C", "Cb":"B", "Db":"C#", "D#":"Eb", "E#":"F", "Fb":"E", "Gb":"F#", "G#":"Ab"};
        if (map[key]) {
            comment.textContent = `(${key} = ${map[key]})`;
            key = map[key];
        }
        return key + variant;
    }

    function drawChord() {
        const key = getKey();
        const allEntries = Object.values(chordsData).flat();
        const entry = allEntries.find(c => c.note === key);
        if (!entry) return;

        document.querySelector("#note-display").textContent = entry.note;
        const fretNut = document.querySelector("#fret0");
        const firstFretTxt = document.querySelector("#firstfret");
        fretNut.style.strokeWidth = entry.firstfret ? 1 : 4;
        firstFretTxt.textContent = entry.firstfret || "";

        for (let i = 0; i < 6; i++) {
            const stringNum = i + 1;
            const fretVal = entry.frets[i];
            const opun = document.querySelector("#opun" + stringNum);
            const dot = document.querySelector("#note" + stringNum);
            const label = document.querySelector("#label" + stringNum);

            opun.textContent = fretVal === -1 ? "x" : (fretVal === 0 ? "o" : "");

            if (fretVal > 0) {
                const yPos = 70 + (fretVal * 30) - 15;
                dot.setAttribute("cy", yPos);
                dot.style.visibility = "visible";
                const firstFretInt = entry.firstfret ? parseInt(entry.firstfret) : 0;
                const semitonesFromNut = fretVal + (firstFretInt > 0 ? firstFretInt - 1 : 0);
                const noteIndex = (notesArr.indexOf(tuning[i]) + semitonesFromNut) % 12;
                label.textContent = notesArr[noteIndex];
                label.setAttribute("y", yPos);
                label.style.visibility = "visible";
            } else {
                dot.style.visibility = "hidden";
                label.style.visibility = "hidden";
            }
        }
    }

    document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.currentTarget.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            e.currentTarget.classList.add('selected');
            drawChord();
        });
    });

    drawChord();
</script>
</body>
</html>
