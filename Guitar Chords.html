<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root {
        --bg-color: #f8f9fa;
        --card-bg: #ffffff;
        --primary: #2196F3;
        --border: #dee2e6;
    }

    body {
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background-color: var(--bg-color);
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        background: white;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
    }

    h1 { margin: 0; font-size: 1.1rem; }

    .layout-toggle {
        padding: 6px 12px;
        cursor: pointer;
        background: #eee;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: bold;
    }

    /* --- App Container Logic --- */
    #app-container {
        display: flex;
        flex: 1;
        padding: 10px;
        gap: 15px;
        justify-content: center;
        align-items: center;
        transition: all 0.3s ease;
    }

    /* PORTRAIT MODE (Desktop Layout) */
    #app-container.portrait-mode {
        display: grid;
        grid-template-columns: auto 1fr; 
        max-width: 1000px;
        margin: auto;
        gap: 20px;
    }

    #app-container.portrait-mode .controls {
        display: grid;
        /* Roots and Accidentals share the top row */
        /* Variants take the whole bottom row */
        grid-template-areas: 
            "roots accidentals"
            "variants variants";
        grid-template-columns: 1fr auto; /* Accidentals only take what they need */
        gap: 10px;
    }

    /* Mapping Groups to Grid Areas */
    #app-container.portrait-mode .selection-group:nth-child(1) { grid-area: roots; }
    #app-container.portrait-mode .selection-group:nth-child(2) { 
        grid-area: accidentals; 
        width: 60px; /* Forces it to stay one-button wide */
    }
    #app-container.portrait-mode .selection-group:nth-child(3) { grid-area: variants; }

    /* Forcing Accidental Buttons into a Vertical Tower */
    #app-container.portrait-mode .selection-group:nth-child(2) .selection-row {
        flex-direction: column;
        height: 100%;
    }

    /* STACK MODE (Mobile Layout) */
    #app-container.stack-mode {
        flex-direction: column;
        align-items: center;
        overflow-y: auto;
    }

    #app-container.stack-mode .controls {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        max-width: 450px;
    }

    /* --- Global Button & Row Styles --- */
    .selection-group {
        background: white;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
    }

    h3 { margin: 0 0 8px 0; font-size: 0.7rem; color: #888; text-transform: uppercase; }

    .selection-row {
        display: flex;
        flex-wrap: wrap; /* Allows roots to wrap if needed */
        gap: 6px;
    }

    .option-btn {
        flex: 1 1 40px; 
        padding: 10px 5px;
        border: 1px solid var(--border);
        background: #fff;
        cursor: pointer;
        border-radius: 6px;
        font-size: 0.9rem;
        text-align: center;
        transition: 0.2s;
    }

    .option-btn.selected {
        background: var(--primary);
        color: white;
        border-color: #1976D2;
        font-weight: bold;
    }

    /* --- Visuals --- */
    .chord-svg-container {
        background: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        flex-shrink: 0;
    }

    svg {
        display: block;
        margin: auto;
    }

    /* Natural symbol font fix */
    .option-btn[data-value=""] {
        font-family: "Segoe UI Symbol", "Apple Symbols", sans-serif;
        font-size: 1.1rem;
    }
</style>
</head>

    function toggleLayout() {
        const container = document.getElementById('app-container');
        const btn = document.querySelector('.layout-toggle');
        if (container.classList.contains('portrait-mode')) {
            container.classList.replace('portrait-mode', 'stack-mode');
            btn.textContent = 'Switch to Portrait Mode';
        } else {
            container.classList.replace('stack-mode', 'portrait-mode');
            btn.textContent = 'Switch to Stack Mode';
        }
    }

    function getKey() {
        const note = document.querySelector("#root-row .selected").dataset.value;
        const mod1 = document.querySelector("#type-row .selected").dataset.value;
        const mod2 = document.querySelector("#variant-row .selected").dataset.value;
        
        let key = note + mod1;
        const maps = {"A#":"Bb", "B#":"C", "Cb":"B", "Db":"C#", "D#":"Eb", "E#":"F", "Fb":"E", "Gb":"F#", "G#":"Ab"};
        
        const comment = document.querySelector("#comment");
        if(maps[key]) {
            comment.textContent = `(${key} = ${maps[key]})`;
            key = maps[key];
        } else {
            comment.textContent = "";
        }
        return key + mod2;
    }

    function drawChord() {
        const key = getKey();
        const all = Object.values(chords).flat();
        const entry = all.find(c => c.note === key);

        if (!entry) {
            document.querySelector("#note-display").textContent = "?";
            return;
        }

        document.querySelector("#note-display").textContent = entry.note;
        
        const fret0 = document.querySelector("#fret0");
        const firstFretTxt = document.querySelector("#firstfret");
        
        fret0.style.strokeWidth = entry.firstfret ? 1 : 4;
        firstFretTxt.textContent = entry.firstfret || "";

        for (let i = 0; i < 6; i++) {
            const val = entry.frets[i];
            const op = document.querySelector("#opun" + (i + 1));
            const dot = document.querySelector("#note" + (i + 1));
            
            op.textContent = val === -1 ? "x" : (val === 0 ? "o" : " ");
            
            if (val > 0) {
                // Corrected Y coordinate: start fret line (35) + offset (val * 25) - 12 (centered in fret space)
                const yPos = 35 + (val * 25) - 12.5;
                dot.setAttribute("cy", yPos);
                dot.style.visibility = "visible";
            } else {
                dot.style.visibility = "hidden";
            }
        }
    }

    document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.currentTarget.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            e.currentTarget.classList.add('selected');
            drawChord();
        });
    });

    drawChord();
</script>
